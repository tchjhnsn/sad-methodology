<svg viewBox="0 0 900 1320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sad-arch-title sad-arch-desc" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title id="sad-arch-title">Specification-Anchored Development — Lifecycle Architecture</title>
  <desc id="sad-arch-desc">Vertical lifecycle from Idea to Production via seven phases, each reducing a specific kind of ambiguity. A horizontal band marks the Documentation-to-Implementation boundary between Phase 1B and Phase 2 (where work moves from the vault to the code folder). Phase 1B expands into a document-derivation tree; the ambiguity catalog bridges it to Phase 3. After Production, a CI/CD + Spec Evolution loop cycles back to Phase 4.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="arr-sm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr-cat" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a6b1f"/>
    </marker>
    <marker id="arr-fb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
    <marker id="arr-cicd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a6a1f"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#111">Specification-Anchored Development — Lifecycle Architecture</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#555" font-style="italic">From fuzzy idea to verified production through progressive ambiguity reduction — for software products</text>

  <!-- Zone label: Documentation (top band) -->
  <text x="40" y="90" font-size="10" font-weight="700" fill="#666" letter-spacing="1.2">DOCUMENTATION PHASES</text>
  <text x="40" y="103" font-size="9" fill="#888" font-style="italic">lives in ~/Documents/projects/&lt;entity&gt;/ (vault)</text>

  <!-- IDEA -->
  <rect x="350" y="116" width="200" height="54" rx="27" fill="#fafaf6" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="450" y="144" text-anchor="middle" font-size="15" font-weight="600" fill="#555" font-style="italic">Idea</text>
  <text x="450" y="160" text-anchor="middle" font-size="10" fill="#888">fuzzy · implicit assumptions · unnamed contradictions</text>
  <line x1="450" y1="170" x2="450" y2="190" stroke="#222" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Raw sources side panel -->
  <rect x="22" y="192" width="90" height="290" rx="4" fill="#fafaf6" stroke="#ccc" stroke-width="1"/>
  <text x="67" y="211" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Raw sources</text>
  <text x="67" y="226" text-anchor="middle" font-size="9" fill="#777">(immutable)</text>
  <text x="67" y="252" text-anchor="middle" font-size="9" fill="#444">_ideas/</text>
  <text x="67" y="267" text-anchor="middle" font-size="9" fill="#444">_sources/</text>
  <text x="67" y="282" text-anchor="middle" font-size="9" fill="#444">_sessions/raw/</text>
  <text x="67" y="310" text-anchor="middle" font-size="9" fill="#888">21 subtypes:</text>
  <text x="67" y="324" text-anchor="middle" font-size="9" fill="#888">idea-dumps,</text>
  <text x="67" y="338" text-anchor="middle" font-size="9" fill="#888">papers, podcasts,</text>
  <text x="67" y="352" text-anchor="middle" font-size="9" fill="#888">conversations,</text>
  <text x="67" y="366" text-anchor="middle" font-size="9" fill="#888">screenshots,</text>
  <text x="67" y="380" text-anchor="middle" font-size="9" fill="#888">session proposals...</text>
  <text x="67" y="430" text-anchor="middle" font-size="9" fill="#666" font-style="italic">fed into 0A;</text>
  <text x="67" y="444" text-anchor="middle" font-size="9" fill="#666" font-style="italic">stress-tested in 0B</text>

  <!-- Phase 0A -->
  <rect x="140" y="190" width="640" height="60" rx="6" fill="#f6f6f2" stroke="#333" stroke-width="1.2"/>
  <text x="158" y="212" font-size="14" font-weight="600" fill="#111">Phase 0A — Externalize &amp; Gather</text>
  <text x="158" y="229" font-size="10" fill="#333">Eliminates: the invisible. Externalize the idea AND deposit raw sources (papers, podcasts, conversations) that ground it.  ★ 0A</text>
  <text x="770" y="217" text-anchor="end" font-size="11" font-weight="500" fill="#4a6b1f">→ IDEA_MAP.md</text>
  <text x="770" y="233" text-anchor="end" font-size="10" fill="#4a6b1f">+ _sources/ deposits</text>
  <line x1="460" y1="250" x2="460" y2="268" stroke="#222" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Phase 0B -->
  <rect x="140" y="268" width="640" height="60" rx="6" fill="#f6f6f2" stroke="#333" stroke-width="1.2"/>
  <text x="158" y="290" font-size="14" font-weight="600" fill="#111">Phase 0B — Stress-Test</text>
  <text x="158" y="307" font-size="10" fill="#333">Eliminates: gaps in the research foundation. Finds what's missing in the idea AND in the research it rests on.</text>
  <text x="158" y="321" font-size="9" fill="#666" font-style="italic">If no research exists, this phase exposes that. If research is rich, this phase stress-tests it.  ★ 0B</text>
  <text x="770" y="295" text-anchor="end" font-size="11" font-weight="500" fill="#4a6b1f">→ RESEARCH_SYNTHESIS.md</text>
  <line x1="460" y1="328" x2="460" y2="346" stroke="#222" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Phase 0C -->
  <rect x="140" y="346" width="640" height="56" rx="6" fill="#f6f6f2" stroke="#333" stroke-width="1.2"/>
  <text x="158" y="369" font-size="14" font-weight="600" fill="#111">Phase 0C — Articulate the Unconstrained Vision</text>
  <text x="158" y="387" font-size="10" fill="#333">Eliminates: self-censorship. Includes Version Lattice + "What This Will Never Be".  ★ 0C</text>
  <text x="770" y="378" text-anchor="end" font-size="11" font-weight="500" fill="#4a6b1f">→ VISION_SPEC.md</text>
  <line x1="460" y1="402" x2="460" y2="420" stroke="#222" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Phase 1A -->
  <rect x="140" y="420" width="640" height="56" rx="6" fill="#f6f6f2" stroke="#333" stroke-width="1.2"/>
  <text x="158" y="443" font-size="14" font-weight="600" fill="#111">Phase 1A — Scope</text>
  <text x="158" y="461" font-size="10" fill="#333">Eliminates: "is X in this version or later?" Subtractive cut of the vision.  ★ 1A</text>
  <text x="770" y="452" text-anchor="end" font-size="11" font-weight="500" fill="#4a6b1f">→ VERSION_SPEC_v1.md</text>
  <line x1="460" y1="476" x2="460" y2="494" stroke="#222" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Phase 1B (expanded) -->
  <rect x="90" y="494" width="740" height="274" rx="8" fill="#f4f8e8" stroke="#4a6b1f" stroke-width="2"/>
  <text x="110" y="520" font-size="15" font-weight="700" fill="#111">Phase 1B — Specify  &#8635;</text>
  <text x="110" y="538" font-size="10" fill="#333">Eliminates: interpretive space the AI operates in during implementation. Spec Convergence Loop: ambiguity &lt; 10% (critical) before ★ 1B.</text>

  <rect x="360" y="560" width="180" height="38" rx="4" fill="#fff" stroke="#4a6b1f" stroke-width="1.5"/>
  <text x="450" y="583" text-anchor="middle" font-size="12" font-weight="600" fill="#111">PRODUCT_SPEC</text>

  <line x1="450" y1="598" x2="450" y2="618" stroke="#333" stroke-width="1.2"/>
  <line x1="175" y1="618" x2="725" y2="618" stroke="#333" stroke-width="1.2"/>
  <line x1="175" y1="618" x2="175" y2="638" stroke="#333" stroke-width="1.2" marker-end="url(#arr-sm)"/>
  <line x1="358" y1="618" x2="358" y2="638" stroke="#333" stroke-width="1.2" marker-end="url(#arr-sm)"/>
  <line x1="542" y1="618" x2="542" y2="638" stroke="#333" stroke-width="1.2" marker-end="url(#arr-sm)"/>
  <line x1="725" y1="618" x2="725" y2="638" stroke="#333" stroke-width="1.2" marker-end="url(#arr-sm)"/>

  <rect x="105" y="642" width="140" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="175" y="665" text-anchor="middle" font-size="11" font-weight="600" fill="#111">DATA_MODEL_SPEC</text>
  <rect x="288" y="642" width="140" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="358" y="665" text-anchor="middle" font-size="11" font-weight="600" fill="#111">IMPL_SPEC</text>
  <rect x="472" y="642" width="140" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="542" y="665" text-anchor="middle" font-size="11" font-weight="600" fill="#111">BEHAVIORAL_SPEC</text>
  <rect x="655" y="642" width="140" height="36" rx="4" fill="#fff" stroke="#4a6b1f" stroke-width="2"/>
  <text x="725" y="665" text-anchor="middle" font-size="11" font-weight="600" fill="#111">VERIFICATION_SPEC</text>

  <text x="110" y="705" font-size="10" fill="#444" font-style="italic">Derivation rule: each layer derives from the one above. Parent wins on conflict.</text>
  <text x="110" y="728" font-size="10" font-weight="600" fill="#4a6b1f">Ambiguity Catalog:</text>
  <text x="110" y="743" font-size="10" fill="#333">unresolved ambiguities from Spec Convergence carry into Verification Spec as priority test scenarios  →→→</text>

  <!-- DOCUMENTATION → IMPLEMENTATION BOUNDARY BAND -->
  <rect x="0" y="776" width="900" height="36" fill="#fff4e8" stroke="none"/>
  <line x1="0" y1="776" x2="900" y2="776" stroke="#c89a4a" stroke-width="1.5" stroke-dasharray="8,4"/>
  <line x1="0" y1="812" x2="900" y2="812" stroke="#c89a4a" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="450" y="796" text-anchor="middle" font-size="11" font-weight="700" fill="#8a5a1a" letter-spacing="0.8">DOCUMENTATION &#8595;&#8595;&#8595; IMPLEMENTATION</text>
  <text x="450" y="808" text-anchor="middle" font-size="9" fill="#8a5a1a" font-style="italic">~/Documents/projects/&lt;entity&gt;/ (vault)  →  ~/code/&lt;repo&gt;/ (code folder)</text>

  <!-- Zone label: Implementation (after the band) -->
  <text x="40" y="838" font-size="10" font-weight="700" fill="#666" letter-spacing="1.2">IMPLEMENTATION PHASES</text>
  <text x="40" y="851" font-size="9" fill="#888" font-style="italic">lives in ~/code/&lt;repo&gt;/</text>

  <line x1="460" y1="818" x2="460" y2="858" stroke="#222" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Phase 2 -->
  <rect x="140" y="858" width="640" height="56" rx="6" fill="#f6f6f2" stroke="#333" stroke-width="1.2"/>
  <text x="158" y="881" font-size="14" font-weight="600" fill="#111">Phase 2 — Implement</text>
  <text x="158" y="899" font-size="10" fill="#333">Eliminates: drift from spec. Decision Boundary: CONFIRM / REDIRECT / ESCALATE on any ambiguity.  ★ 2.x</text>
  <line x1="460" y1="914" x2="460" y2="932" stroke="#222" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Ambiguity catalog arrow (from 1B right edge, around the doc/impl band, down to Phase 3) -->
  <path d="M 795 680 L 795 770 L 850 770 L 850 820 L 795 820 L 795 932" stroke="#4a6b1f" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arr-cat)"/>
  <text x="862" y="770" font-size="9" fill="#4a6b1f" font-style="italic">catalog</text>
  <text x="862" y="782" font-size="9" fill="#4a6b1f" font-style="italic">to Phase 3</text>

  <!-- Phase 3 -->
  <rect x="90" y="932" width="740" height="62" rx="8" fill="#f4f8e8" stroke="#4a6b1f" stroke-width="2"/>
  <text x="110" y="957" font-size="15" font-weight="700" fill="#111">Phase 3 — Verify  &#8635;</text>
  <text x="110" y="975" font-size="10" fill="#333">Eliminates: silent compliance failure. Implementation Convergence runs scenarios from Verification Spec + ambiguity catalog.</text>
  <text x="110" y="989" font-size="10" fill="#333">Iterate until compliance ≥ 95% (generated) and 100% (cataloged) before ★ 3.</text>

  <!-- Feedback arrow (Phase 4) -->
  <path d="M 85 962 Q 20 962, 20 760 Q 20 588, 85 588" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-fb)"/>
  <text x="30" y="760" font-size="10" fill="#888" font-style="italic" text-anchor="middle" transform="rotate(-90 30 760)">Phase 4 — Spec Evolution (on verified gap)</text>

  <line x1="460" y1="994" x2="460" y2="1012" stroke="#222" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Phase 5 -->
  <rect x="140" y="1012" width="640" height="56" rx="6" fill="#f6f6f2" stroke="#333" stroke-width="1.2"/>
  <text x="158" y="1035" font-size="14" font-weight="600" fill="#111">Phase 5 — Completion</text>
  <text x="158" y="1053" font-size="10" fill="#333">Full spec audit; Vision Spec compatibility check; version archival alongside code.  ★ 5</text>
  <line x1="460" y1="1068" x2="460" y2="1086" stroke="#222" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- PRODUCTION -->
  <rect x="310" y="1086" width="280" height="60" rx="6" fill="#e6efd8" stroke="#4a6b1f" stroke-width="2"/>
  <text x="450" y="1110" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Production</text>
  <text x="450" y="1126" text-anchor="middle" font-size="10" fill="#4a6b1f">specified · verified · versioned · eval-anchored</text>
  <text x="450" y="1140" text-anchor="middle" font-size="9" fill="#666" font-style="italic">ongoing: CI/CD + Spec Evolution (Phase 4)</text>

  <!-- CI/CD loop arrow: Production -> back up to Phase 4 zone (right side) -->
  <path d="M 590 1116 Q 870 1116, 870 760 Q 870 588, 830 588" stroke="#8a6a1f" stroke-width="1.5" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-cicd)"/>
  <text x="880" y="880" font-size="10" fill="#8a6a1f" font-style="italic" text-anchor="middle" transform="rotate(-90 880 880)">CI/CD · monitoring · Spec Evolution</text>

  <!-- Cross-cutting band -->
  <rect x="22" y="1172" width="856" height="60" rx="4" fill="#fafaf6" stroke="#d8d8d0" stroke-width="1"/>
  <text x="40" y="1191" font-size="11" font-weight="600" fill="#333">Cross-cutting disciplines</text>
  <text x="40" y="1207" font-size="10" fill="#444">· Two-layer data model: Raw (immutable) ↔ Compiled (re-buildable). Context survives AI compaction.   · Scope levels: Global / Project / Local mapped to Claude Code memory.</text>
  <text x="40" y="1221" font-size="10" fill="#444">· Session-opening protocol reads SESSION_LOG + CLAUDE.md before any code.   · Human ★ checkpoint at every phase gate.   · Capability-skills: time-awareness, session-capture.</text>

  <!-- Credit -->
  <text x="450" y="1262" text-anchor="middle" font-size="10" fill="#777" font-style="italic">Inspired by Andrej Karpathy's writing on LLM auto-research: without specs, the LLM has no ground truth to evaluate against — evaluation becomes circular.</text>
  <text x="450" y="1280" text-anchor="middle" font-size="10" fill="#888" font-style="italic">SAD's claim: compounding clarity (phase-by-phase ambiguity reduction) collapses compounding error.</text>
</svg>
